  <script src="/utils/api.js"></script>
  <script src="/utils/auth.js"></script>
  <script>
    auth.checkAuth('admin');
    document.getElementById('logoutBtn').addEventListener('click', auth.logout);

    async function loadUnverifiedAgencies() {
      try {
        const agencies = await api.get('/admin/agencies/unverified');
        const tbody = document.getElementById('agenciesTable');
        
        if (agencies.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" class="text-center">No pending agencies found.</td></tr>';
          return;
        }

        tbody.innerHTML = agencies.map(a => `
          <tr>
            <td>${a.name}</td>
            <td>${a.email}</td>
            <td>${new Date(a.createdAt).toLocaleDateString()}</td>
            <td>
              <button class="btn" style="padding: 0.5rem 1rem;" onclick="verifyAgency('${a._id}')">Verify</button>
            </td>
          </tr>
        `).join('');
      } catch (err) {
        alert(err.message);
      }
    }

    async function verifyAgency(id) {
      if(!confirm('Are you sure you want to verify this agency?')) return;
      try {
        await api.put(`/admin/agencies/${id}/verify`);
        alert('Agency verified successfully');
        loadUnverifiedAgencies();
      } catch(err) {
        alert(err.message);
      }
    }

    loadUnverifiedAgencies();
  </script>
