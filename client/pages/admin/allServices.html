      <div class="app-content">
        <h1>All Services</h1>
        <p class="app-subtitle">Manage and view all registered e-waste collection services.</p>

        <div class="filters-container" style="background: white; padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-end;">
          <div style="flex: 1; min-width: 200px;">
            <label style="font-size: 0.85rem; font-weight: 600; color: #495057; margin-bottom: 0.5rem; display: block;">Location / Area</label>
            <input type="text" id="locationSearch" placeholder="Search location..." style="width: 100%; padding: 0.6rem; border: 1px solid #ced4da; border-radius: 8px;">
          </div>
          <div style="flex: 1; min-width: 200px;">
            <label style="font-size: 0.85rem; font-weight: 600; color: #495057; margin-bottom: 0.5rem; display: block;">Status Filter</label>
            <select id="statusFilter" style="width: 100%; padding: 0.6rem; border: 1px solid #ced4da; border-radius: 8px; background: white;">
              <option value="all">All Services</option>
              <option value="approved">Approved</option>
              <option value="pending">Pending</option>
            </select>
          </div>
          <div style="flex: 1; min-width: 200px;">
            <label style="font-size: 0.85rem; font-weight: 600; color: #495057; margin-bottom: 0.5rem; display: block;">Sort By Date</label>
            <select id="dateSort" style="width: 100%; padding: 0.6rem; border: 1px solid #ced4da; border-radius: 8px; background: white;">
              <option value="newest">Newest First</option>
              <option value="oldest">Oldest First</option>
            </select>
          </div>
        </div>

        <div class="table-card" style="overflow-x:auto;">
          <table class="app-table">
            <thead>
              <tr>
                <th>Service Name</th>
                <th>Category (Waste)</th>
                <th>Location</th>
                <th>Status</th>
                <th>Created Date</th>
              </tr>
            </thead>
            <tbody id="servicesTable">
              <!-- Rows loaded dynamically -->
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <script src="/utils/api.js"></script>
  <script src="/utils/auth.js"></script>
  <script>
    auth.checkAuth('admin');
    document.getElementById('logoutBtn').addEventListener('click', auth.logout);

    let allServices = [];

    async function fetchServices() {
      const tbody = document.getElementById('servicesTable');
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Loading...</td></tr>';
      try {
        allServices = await api.get('/admin/services');
        renderServices();
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:red;">Error: ${err.message}</td></tr>`;
      }
    }

    function renderServices() {
      const tbody = document.getElementById('servicesTable');
      const nameSearch = document.getElementById('mainSearchInput').value.toLowerCase();
      const locationSearch = document.getElementById('locationSearch').value.toLowerCase();
      const statusFilter = document.getElementById('statusFilter').value;
      const sortDate = document.getElementById('dateSort').value;

      let filtered = allServices.filter(s => {
        const matchesName = s.serviceName.toLowerCase().includes(nameSearch);
        const matchesLocation = s.serviceArea.toLowerCase().includes(locationSearch);
        let matchesStatus = true;
        if (statusFilter === 'approved') matchesStatus = s.isApproved === true;
        if (statusFilter === 'pending') matchesStatus = s.isApproved === false;

        return matchesName && matchesLocation && matchesStatus;
      });

      filtered.sort((a, b) => {
        const dateA = new Date(a.createdAt || 0).getTime();
        const dateB = new Date(b.createdAt || 0).getTime();
        return sortDate === 'newest' ? dateB - dateA : dateA - dateB;
      });

      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 2rem;">No services found matching filters.</td></tr>';
        return;
      }

      tbody.innerHTML = filtered.map(s => {
        const statusBadge = s.isApproved 
          ? '<span style="padding: 4px 8px; border-radius: 12px; background: #d4edda; color: #155724; font-size: 0.8rem; font-weight: bold;">Approved</span>'
          : '<span style="padding: 4px 8px; border-radius: 12px; background: #fff3cd; color: #856404; font-size: 0.8rem; font-weight: bold;">Pending</span>';
        
        return `
          <tr>
            <td><strong>${s.serviceName}</strong><br><small style="color:#6c757d;">by ${s.agency ? s.agency.name : 'Unknown'}</small></td>
            <td>${Array.isArray(s.acceptableWaste) ? s.acceptableWaste.join(', ') : s.acceptableWaste}</td>
            <td>${s.serviceArea}</td>
            <td>${statusBadge}</td>
            <td>${new Date(s.createdAt).toLocaleDateString()}</td>
          </tr>
        `;
      }).join('');
    }

    document.getElementById('mainSearchInput').addEventListener('input', renderServices);
    document.getElementById('locationSearch').addEventListener('input', renderServices);
    document.getElementById('statusFilter').addEventListener('change', renderServices);
    document.getElementById('dateSort').addEventListener('change', renderServices);

    fetchServices();
  </script>
