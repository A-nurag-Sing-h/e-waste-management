          </div>
        </div>
      </header>

      <div class="app-content">
        <h1>All Agencies</h1>
        <p class="app-subtitle">Manage and view all registered e-waste collection agencies.</p>

        <div class="filters-container" style="background: white; padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-end;">
          <div style="flex: 1; min-width: 200px;">
            <label style="font-size: 0.85rem; font-weight: 600; color: #495057; margin-bottom: 0.5rem; display: block;">Status Filter</label>
            <select id="statusFilter" style="width: 100%; padding: 0.6rem; border: 1px solid #ced4da; border-radius: 8px; background: white;">
              <option value="all">All Agencies</option>
              <option value="verified">Verified</option>
              <option value="unverified">Unverified</option>
            </select>
          </div>
          <div style="flex: 1; min-width: 200px;">
            <label style="font-size: 0.85rem; font-weight: 600; color: #495057; margin-bottom: 0.5rem; display: block;">Sort By Date</label>
            <select id="dateSort" style="width: 100%; padding: 0.6rem; border: 1px solid #ced4da; border-radius: 8px; background: white;">
              <option value="newest">Newest First</option>
              <option value="oldest">Oldest First</option>
            </select>
          </div>
        </div>

        <div class="table-card" style="overflow-x:auto;">
          <table class="app-table">
            <thead>
              <tr>
                <th>Agency Name</th>
                <th>Location</th>
                <th>Contact (Email)</th>
                <th>Status</th>
                <th>Total Services</th>
                <th>Joined Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="agenciesTable">
              <!-- Rows loaded dynamically -->
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <script src="/utils/api.js"></script>
  <script src="/utils/auth.js"></script>
  <script>
    auth.checkAuth('admin');
    document.getElementById('logoutBtn').addEventListener('click', auth.logout);

    let allAgencies = [];

    async function fetchAgencies() {
      const tbody = document.getElementById('agenciesTable');
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">Loading...</td></tr>';
      try {
        allAgencies = await api.get('/admin/agencies');
        renderAgencies();
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:red;">Error: ${err.message}</td></tr>`;
      }
    }

    async function deleteAgency(agencyId) {
      if (!confirm('Are you sure you want to delete this agency? This will also delete all their services.')) {
        return;
      }
      try {
        await api.delete(`/admin/agencies/${agencyId}`);
        fetchAgencies(); // Refresh the list
      } catch (err) {
        alert('Failed to delete agency: ' + err.message);
      }
    }

    function renderAgencies() {
      const tbody = document.getElementById('agenciesTable');
      const nameSearch = document.getElementById('mainSearchInput').value.toLowerCase();
      const statusFilter = document.getElementById('statusFilter').value;
      const sortDate = document.getElementById('dateSort').value;

      let filtered = allAgencies.filter(a => {
        const matchesName = a.name.toLowerCase().includes(nameSearch);
        let matchesStatus = true;
        if (statusFilter === 'verified') matchesStatus = a.isVerified === true;
        if (statusFilter === 'unverified') matchesStatus = a.isVerified === false;

        return matchesName && matchesStatus;
      });

      filtered.sort((a, b) => {
        const dateA = new Date(a.createdAt || 0).getTime();
        const dateB = new Date(b.createdAt || 0).getTime();
        return sortDate === 'newest' ? dateB - dateA : dateA - dateB;
      });

      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 2rem;">No agencies found matching filters.</td></tr>';
        return;
      }

      tbody.innerHTML = filtered.map(a => {
        const statusBadge = a.isVerified 
          ? '<span style="padding: 4px 8px; border-radius: 12px; background: #d4edda; color: #155724; font-size: 0.8rem; font-weight: bold;">Verified</span>'
          : '<span style="padding: 4px 8px; border-radius: 12px; background: #fff3cd; color: #856404; font-size: 0.8rem; font-weight: bold;">Unverified</span>';
        
        return `
          <tr>
            <td><strong>${a.name}</strong></td>
            <td style="color:#6c757d; font-style:italic;">N/A (Set per service)</td>
            <td>${a.email}</td>
            <td>${statusBadge}</td>
            <td>${a.servicesCount || 0}</td>
            <td>${new Date(a.createdAt).toLocaleDateString()}</td>
            <td>
              <button onclick="deleteAgency('${a._id}')" style="background-color: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.8rem;">Delete</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    document.getElementById('mainSearchInput').addEventListener('input', renderAgencies);
    document.getElementById('statusFilter').addEventListener('change', renderAgencies);
    document.getElementById('dateSort').addEventListener('change', renderAgencies);

    fetchAgencies();
  </script>
