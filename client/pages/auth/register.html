<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - E-Waste Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/style.css?v=2">
</head>
<body>
  <div class="auth-wrapper" style="min-height: 100vh;">
    <a href="/index.html" class="auth-logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#188038" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="border-radius: 8px;"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
      EcoCycle
    </a>

    <div class="auth-card" style="border-top: none; border-radius: 20px;">
      <h2>Join the Movement</h2>
      <p class="auth-subtitle">Create your EcoCycle account to start managing e-waste responsibly.</p>
      
      <div id="errorMsg" style="color: red; text-align: center; margin-bottom: 1rem;"></div>
      
      <form id="registerForm">
        <div class="auth-form-group">
          <label>Register As</label>
          <div class="input-icon-wrapper no-left-icon">
            <select id="type" required>
              <option value="user">Individual User</option>
              <option value="agency">Agency</option>
            </select>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-right" style="pointer-events: none;"><path d="m6 9 6 6 6-6"></path></svg>
          </div>
        </div>

        <div class="auth-form-group">
          <label>Full Name or Agency Name</label>
          <div class="input-icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-left"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <input type="text" id="name" placeholder="Jane Doe" required>
          </div>
        </div>

        <div class="auth-form-group">
          <label>Email Address</label>
          <div class="input-icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-left"><rect width="20" height="16" x="2" y="4" rx="2"></rect><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path></svg>
            <input type="email" id="email" placeholder="jane@example.com" required>
          </div>
        </div>
        
        <div class="auth-form-group" style="margin-bottom: 0.5rem;">
          <label>Password</label>
          <div class="input-icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-left"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            <input type="password" id="password" placeholder="••••••••" required minlength="8">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-right" id="togglePassword"><path d="m15 18-.722-3.25"></path><path d="M2 8a10.645 10.645 0 0 0 20 0"></path><path d="m20 15-1.726-2.05"></path><path d="m4 15 1.727-2.05"></path><path d="m9 18 .721-3.25"></path></svg>
          </div>
        </div>
        <p style="font-size: 0.75rem; color: #888; margin-bottom: 1.5rem;">Must be at least 8 characters long.</p>

        <label class="auth-checkbox">
          <input type="checkbox" required>
          <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</span>
        </label>

        <button type="submit" class="auth-submit-btn">Create Account</button>
      </form>

      <div style="text-align: center; margin-top: 1.5rem; border-top: 1px solid #eaeaea; padding-top: 1.5rem;" class="auth-footer-link">
        Already have an account? <a href="login.html">Sign In</a>
      </div>
    </div>
    
    <div class="auth-page-footer-simple">
      &copy; 2024 EcoCycle. The Regenerative Canvas.
    </div>
  </div>

  <script src="/utils/api.js"></script>
  <script src="/utils/auth.js"></script>
  <script>
    // Password Visibility Toggle
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    
    togglePassword.addEventListener('click', function () {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      
      if(type === 'text') {
        this.innerHTML = '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle>';
      } else {
        this.innerHTML = '<path d="m15 18-.722-3.25"></path><path d="M2 8a10.645 10.645 0 0 0 20 0"></path><path d="m20 15-1.726-2.05"></path><path d="m4 15 1.727-2.05"></path><path d="m9 18 .721-3.25"></path>';
      }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const type = document.getElementById('type').value;

      try {
        let data;
        if(type === 'agency') {
          data = await auth.registerAgency(name, email, password);
          alert('Registration successful! Please wait for admin verification before using services.');
          window.location.href = '../agency/dashboard.html';
        } else {
          data = await auth.registerUser(name, email, password);
          window.location.href = '../user/dashboard.html';
        }
      } catch (err) {
        document.getElementById('errorMsg').innerText = err.message;
      }
    });
  </script>
</body>
</html>
