<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - E-Waste Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css?v=2">
</head>
<body>
  <div class="auth-wrapper">
    <a href="/index.html" class="auth-logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="#188038" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="border-radius: 8px;"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"></path><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"></path></svg>
      EcoCycle
    </a>

    <div class="auth-card">
      <h2>Welcome Back</h2>
      <p class="auth-subtitle">Sign in to continue to your dashboard.</p>
      
      <div id="errorMsg" style="color: red; text-align: center; margin-bottom: 1rem;"></div>
      
      <div class="role-toggle">
        <button type="button" class="role-btn active" data-role="user">User</button>
        <button type="button" class="role-btn" data-role="agency">Agency</button>
        <button type="button" class="role-btn" data-role="admin">Admin</button>
      </div>

      <form id="loginForm">
        <input type="hidden" id="type" value="user">

        <div class="auth-form-group">
          <label>Email Address</label>
          <div class="input-icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-left"><rect width="20" height="16" x="2" y="4" rx="2"></rect><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path></svg>
            <input type="email" id="email" placeholder="name@company.com" required>
          </div>
        </div>
        <div class="auth-form-group">
          <label>
            Password
            <a href="#" class="forgot-link">Forgot Password?</a>
          </label>
          <div class="input-icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-left"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            <input type="password" id="password" placeholder="••••••••" required>
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-right" id="togglePassword"><path d="m15 18-.722-3.25"></path><path d="M2 8a10.645 10.645 0 0 0 20 0"></path><path d="m20 15-1.726-2.05"></path><path d="m4 15 1.727-2.05"></path><path d="m9 18 .721-3.25"></path></svg>
          </div>
        </div>

        <label class="auth-checkbox">
          <input type="checkbox">
          Remember me for 30 days
        </label>

        <button type="submit" class="auth-submit-btn">Login</button>
      </form>

      <div class="auth-footer-link">
        Don't have an account? <a href="register.html">Register now</a>
      </div>
    </div>
  </div>

  <footer class="auth-page-footer-dark">
    <div class="footer-left">
      <div class="footer-logo">
        EcoCycle
      </div>
      <p style="margin:0; font-size: 0.875rem;">&copy; 2024 EcoCycle. Leading the transition to a circular<br>electronics economy.</p>
    </div>
    <div class="footer-links">
      <a href="#">Privacy Policy</a>
      <a href="#">Terms of Service</a>
      <a href="#">Cookie Settings</a>
      <a href="#">Sustainability Report</a>
    </div>
  </footer>

  <script src="/utils/api.js"></script>
  <script src="/utils/auth.js"></script>
  <script>
    // Role Toggle Logic
    const roleBtns = document.querySelectorAll('.role-btn');
    const typeInput = document.getElementById('type');

    roleBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        roleBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        typeInput.value = btn.dataset.role;
      });
    });

    // Password Visibility Toggle
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    
    togglePassword.addEventListener('click', function () {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      
      if(type === 'text') {
        this.innerHTML = '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle>';
      } else {
        this.innerHTML = '<path d="m15 18-.722-3.25"></path><path d="M2 8a10.645 10.645 0 0 0 20 0"></path><path d="m20 15-1.726-2.05"></path><path d="m4 15 1.727-2.05"></path><path d="m9 18 .721-3.25"></path>';
      }
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const type = document.getElementById('type').value;

      try {
        const data = await auth.login(email, password, type);
        if(data.role === 'admin') window.location.href = '../admin/dashboard.html';
        else if(data.role === 'agency') window.location.href = '../agency/dashboard.html';
        else window.location.href = '../user/dashboard.html';
      } catch (err) {
        document.getElementById('errorMsg').innerText = err.message;
      }
    });
  </script>
</body>
</html>
