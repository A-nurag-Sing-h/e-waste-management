      <div class="app-content">

      <h1>Create New E-Waste Collection Service</h1>
      
      <form id="createServiceForm" class="mt-2" style="max-width: 500px;">
        <div class="form-group">
          <label>Service Name</label>
          <input type="text" id="serviceName" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="description" rows="3" required></textarea>
        </div>
        <div class="form-group">
          <label>Acceptable Waste (comma separated)</label>
          <input type="text" id="acceptableWaste" placeholder="e.g. Laptops, Mobiles, Batteries" required>
        </div>
        <div class="form-group">
          <label>Service Area / Zone</label>
          <input type="text" id="serviceArea" required>
        </div>
        <button type="submit" class="btn">Create Service</button>
      </form>
    
      </div>
    </main>
  </div>
  <script src="/utils/api.js"></script>
  <script src="/utils/auth.js"></script>
  <script>
    const user = auth.checkAuth('agency');
    document.getElementById('logoutBtn').addEventListener('click', auth.logout);

    document.getElementById('createServiceForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      if (!user.isVerified) {
        alert('Your agency must be verified by an admin before you can create a service.');
        return;
      }

      const acceptableWasteArr = document.getElementById('acceptableWaste').value
                                  .split(',')
                                  .map(w => w.trim());

      try {
        await api.post('/agency/services', {
          serviceName: document.getElementById('serviceName').value,
          description: document.getElementById('description').value,
          acceptableWaste: acceptableWasteArr,
          serviceArea: document.getElementById('serviceArea').value
        });
        alert('Service created successfully! Please wait for admin approval.');
        window.location.href = 'myServices.html';
      } catch (err) {
        alert(err.message);
      }
    });
  </script>
