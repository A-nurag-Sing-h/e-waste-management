<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Services - EcoCycle</title>
  <link rel="stylesheet" href="/assets/css/style.css?v=4">
</head>
<body class="app-body">
  <div class="app-layout">
    <aside class="app-sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12A10 10 0 0 0 15 21.54A10 10 0 0 1 15 2.46 10 10 0 0 0 2 12Z"></path></svg>
        </div>
        <div class="sidebar-header-text">
          <h2>User Hub</h2>
          <p>Personal E-Waste Management</p>
        </div>
      </div>
      
      <nav class="sidebar-nav">
        <a href="dashboard.html" >
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9h18M9 21V9"></path></svg>
          Dashboard
        </a>
        <a href="services.html" class="active">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          Find Services
        </a>
        <a href="myBookings.html" >
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
          My Bookings
        </a>
      </nav>
      
      <div class="sidebar-footer">
        <a href="#">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
          Support
        </a>
        <a href="#" id="logoutBtn" class="logout">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          Logout
        </a>
      </div>
    </aside>

    <main class="app-main">
      <header class="app-header">
        <div class="search-bar">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" id="mainSearchInput" placeholder="Search service name...">
        </div>
        <div class="header-actions">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          <div class="header-avatar">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          </div>
        </div>
      </header>

      <div class="app-content">
        <h1>Available E-Waste Services</h1>
        <p class="app-subtitle">Browse and book verified e-waste collection services in your area.</p>

        <div class="filters-container" style="background: white; padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-end;">
          <div style="flex: 1; min-width: 200px;">
            <label style="font-size: 0.85rem; font-weight: 600; color: #495057; margin-bottom: 0.5rem; display: block;">Location / Area</label>
            <input type="text" id="locationSearch" placeholder="e.g. Goa, Mumbai..." style="width: 100%; padding: 0.6rem; border: 1px solid #ced4da; border-radius: 8px;">
          </div>
          <div style="flex: 1; min-width: 200px;">
            <label style="font-size: 0.85rem; font-weight: 600; color: #495057; margin-bottom: 0.5rem; display: block;">Sort By</label>
            <select id="dateSort" style="width: 100%; padding: 0.6rem; border: 1px solid #ced4da; border-radius: 8px; background: white;">
              <option value="newest">Newest First</option>
              <option value="oldest">Oldest First</option>
            </select>
          </div>
          <div style="width: 100%; margin-top: 0.5rem;">
            <label style="font-size: 0.85rem; font-weight: 600; color: #495057; margin-bottom: 0.5rem; display: block;">Filter by E-Waste Type</label>
            <div id="typeFilters" style="display: flex; flex-wrap: wrap; gap: 1rem;">
              <label style="display:flex; align-items:center; gap:0.3rem; font-size:0.9rem;"><input type="checkbox" value="Phones" class="waste-filter"> Phones</label>
              <label style="display:flex; align-items:center; gap:0.3rem; font-size:0.9rem;"><input type="checkbox" value="Smartphones" class="waste-filter"> Smartphones</label>
              <label style="display:flex; align-items:center; gap:0.3rem; font-size:0.9rem;"><input type="checkbox" value="Mobiles" class="waste-filter"> Mobiles</label>
              <label style="display:flex; align-items:center; gap:0.3rem; font-size:0.9rem;"><input type="checkbox" value="Laptops" class="waste-filter"> Laptops</label>
              <label style="display:flex; align-items:center; gap:0.3rem; font-size:0.9rem;"><input type="checkbox" value="Computers" class="waste-filter"> Computers</label>
              <label style="display:flex; align-items:center; gap:0.3rem; font-size:0.9rem;"><input type="checkbox" value="Batteries" class="waste-filter"> Batteries</label>
              <label style="display:flex; align-items:center; gap:0.3rem; font-size:0.9rem;"><input type="checkbox" value="Televisions" class="waste-filter"> Televisions</label>
              <label style="display:flex; align-items:center; gap:0.3rem; font-size:0.9rem;"><input type="checkbox" value="Printers" class="waste-filter"> Printers</label>
            </div>
          </div>
        </div>

        <div id="servicesList" class="cards-grid">
          <!-- Services will be loaded here -->
        </div>
      </div>
    </main>
  </div>

  <!-- Booking Modal -->
  <div id="bookingModal" class="glass-panel form-container hidden" style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:2000; box-shadow: 0 0 100px rgba(0,0,0,0.5);">
    <h3>Book Service</h3>
    <form id="bookingForm" class="mt-1">
      <input type="hidden" id="serviceId">
      <div class="form-group">
        <label>Collection Date</label>
        <input type="date" id="date" required>
      </div>
      <div class="form-group">
        <label>Notes/Details about items</label>
        <textarea id="notes" rows="3"></textarea>
      </div>
      <div style="display:flex; gap:1rem;">
        <button type="submit" class="btn-green" style="flex:1; justify-content:center;">Book</button>
        <button type="button" class="btn-green" style="flex:1; background: #adb5bd; justify-content:center;" onclick="document.getElementById('bookingModal').classList.add('hidden')">Cancel</button>
      </div>
    </form>
  </div>

  <script src="/utils/api.js"></script>
  <script src="/utils/auth.js"></script>
  <script>
    auth.checkAuth('user');
    document.getElementById('logoutBtn').addEventListener('click', auth.logout);

    let allServices = [];

    async function loadServices() {
      const list = document.getElementById('servicesList');
      // Show loading spinner
      list.innerHTML = `
        <div style="grid-column:1/-1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:4rem; color:#6c757d;">
          <div style="width:40px;height:40px;border:4px solid #e9ecef;border-top-color:#4caf50;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:1rem;"></div>
          <p>Loading services...</p>
        </div>
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
      `;
      try {
        allServices = await api.get('/user/services');
        console.log('Services API response:', allServices);

        if (!Array.isArray(allServices) || allServices.length === 0) {
          list.innerHTML = `
            <div style="grid-column:1/-1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:4rem; text-align:center;">
              <div style="width:80px;height:80px;background:#e9ecef;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:1.5rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#adb5bd" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              </div>
              <h3 style="font-size:1.25rem;font-weight:700;color:#212529;margin:0 0 0.5rem;">No Services Available Yet</h3>
              <p style="color:#6c757d;font-size:0.9rem;max-width:400px;">There are no approved e-waste collection services in your area right now. Check back soon!</p>
            </div>`;
          return;
        }
        
        renderServices();
      } catch (err) {
        console.error('Error loading services:', err);
        list.innerHTML = `
          <div style="grid-column:1/-1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:4rem; text-align:center;">
            <div style="width:80px;height:80px;background:#fff0f3;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:1.5rem;">
              <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#e03e52" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            </div>
            <h3 style="font-size:1.25rem;font-weight:700;color:#212529;margin:0 0 0.5rem;">Failed to Load Services</h3>
            <p style="color:#6c757d;font-size:0.9rem;max-width:400px;">${err.message}. Please try refreshing the page or logging in again.</p>
            <button onclick="location.reload()" style="margin-top:1rem;padding:0.6rem 1.5rem;background:#4caf50;color:white;border:none;border-radius:20px;font-weight:600;cursor:pointer;">Retry</button>
          </div>`;
      }
    }

    function openBooking(id) {
      document.getElementById('serviceId').value = id;
      document.getElementById('bookingModal').classList.remove('hidden');
    }

    document.getElementById('bookingForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        await api.post('/user/book', {
          serviceId: document.getElementById('serviceId').value,
          collectionDate: document.getElementById('date').value,
          notes: document.getElementById('notes').value
        });
        alert('Booking successful!');
        document.getElementById('bookingModal').classList.add('hidden');
      } catch(err) {
        alert(err.message);
      }
    });

    function renderServices() {
      const list = document.getElementById('servicesList');
      const nameSearch = document.getElementById('mainSearchInput').value.toLowerCase();
      const locationSearch = document.getElementById('locationSearch').value.toLowerCase();
      const sortDate = document.getElementById('dateSort').value;
      
      const checkedTypes = Array.from(document.querySelectorAll('.waste-filter:checked')).map(cb => cb.value.toLowerCase());

      let filtered = allServices.filter(s => {
        const matchesName = s.serviceName.toLowerCase().includes(nameSearch);
        const matchesLocation = s.serviceArea.toLowerCase().includes(locationSearch);
        
        let matchesType = true;
        if (checkedTypes.length > 0) {
          const serviceWaste = Array.isArray(s.acceptableWaste) ? s.acceptableWaste.map(w => w.toLowerCase()) : [s.acceptableWaste.toLowerCase()];
          matchesType = checkedTypes.some(type => serviceWaste.some(w => w.includes(type) || type.includes(w)));
        }

        return matchesName && matchesLocation && matchesType;
      });

      filtered.sort((a, b) => {
        const dateA = new Date(a.createdAt || 0).getTime();
        const dateB = new Date(b.createdAt || 0).getTime();
        return sortDate === 'newest' ? dateB - dateA : dateA - dateB;
      });

      if (filtered.length === 0) {
        list.innerHTML = `
          <div style="grid-column:1/-1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:4rem; text-align:center;">
            <div style="width:80px;height:80px;background:#e9ecef;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:1.5rem;">
              <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#adb5bd" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </div>
            <h3 style="font-size:1.25rem;font-weight:700;color:#212529;margin:0 0 0.5rem;">No Services Match Your Filters</h3>
            <p style="color:#6c757d;font-size:0.9rem;max-width:400px;">Try adjusting your search criteria or clearing filters.</p>
          </div>`;
        return;
      }

      list.innerHTML = filtered.map(s => `
        <div class="card" style="background:white;border-radius:16px;padding:1.5rem;box-shadow:0 4px 15px rgba(0,0,0,0.05);border:1px solid #f1f3f5;transition:all 0.2s;" onmouseover="this.style.transform='translateY(-4px)';this.style.boxShadow='0 8px 25px rgba(0,0,0,0.1)';" onmouseout="this.style.transform='';this.style.boxShadow='0 4px 15px rgba(0,0,0,0.05)';">
          <h3 style="font-size:1.1rem;font-weight:700;color:#212529;margin:0 0 1rem;">${s.serviceName}</h3>
          <p style="font-size:0.85rem;color:#6c757d;margin:0.3rem 0;"><strong style="color:#495057;">Agency:</strong> ${s.agency ? s.agency.name : 'N/A'}</p>
          <p style="font-size:0.85rem;color:#6c757d;margin:0.3rem 0;"><strong style="color:#495057;">Area:</strong> ${s.serviceArea}</p>
          <p style="font-size:0.85rem;color:#6c757d;margin:0.3rem 0;"><strong style="color:#495057;">Accepts:</strong> ${Array.isArray(s.acceptableWaste) ? s.acceptableWaste.join(', ') : s.acceptableWaste}</p>
          <p style="font-size:0.85rem;color:#888;margin:0.75rem 0 0;">${s.description}</p>
          <button class="btn-green" style="margin-top:1rem;" onclick="openBooking('${s._id}')">Book Now</button>
        </div>
      `).join('');
    }

    document.getElementById('mainSearchInput').addEventListener('input', renderServices);
    document.getElementById('locationSearch').addEventListener('input', renderServices);
    document.getElementById('dateSort').addEventListener('change', renderServices);
    document.querySelectorAll('.waste-filter').forEach(cb => cb.addEventListener('change', renderServices));

    loadServices();
  </script>
</body>
</html>
